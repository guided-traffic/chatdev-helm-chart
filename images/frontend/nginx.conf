server {
    listen       8080;
    listen       [::]:8080;
    server_name  _;

    root   /usr/share/nginx/html;
    index  index.html;

    # Vue Router history mode: serve index.html for unknown routes.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Never cache the entry document so the injected runtime config is fresh.
    location = /index.html {
        add_header Cache-Control "no-store";
    }

    # Long-lived caching for fingerprinted build assets.
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
    }
}
