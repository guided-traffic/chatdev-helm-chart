name: Release chart

# Publishes the Helm chart to the GitHub Pages Helm repo using chart-releaser.
# On every push to main it detects charts whose Chart.yaml version is not yet
# released, creates a GitHub Release with the packaged .tgz, and updates the
# index.yaml on the gh-pages branch.
#
# Prerequisites (one-time):
#   - a `gh-pages` branch exists
#   - GitHub Pages is enabled for that branch
# Bump charts/chatdev/Chart.yaml `version` to cut a release.

on:
  push:
    branches:
      - main
    paths:
      - "charts/**"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Git identity
        run: |
          git config user.name "$GITHUB_ACTOR"
          git config user.email "$GITHUB_ACTOR@users.noreply.github.com"

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Run chart-releaser
        uses: helm/chart-releaser-action@v1.6.0
        with:
          charts_dir: charts
          # Idempotent re-runs: don't fail if a release for this version exists,
          # just (re)build and push the index.
          skip_existing: true
        env:
          CR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
