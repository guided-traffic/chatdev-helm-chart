name: Build & push images

# Builds the ChatDev backend (from the pinned upstream Dockerfile) and the
# frontend (our production overlay), then pushes both to Docker Hub.
#
# Triggers:
#   - git tag  v*   -> release build, tags images with the semver + latest
#   - manual        -> build a chosen upstream ref (handy for testing)
#
# Required repo secret: DOCKERHUB_PAT (Docker Hub access token).
# Docker Hub login username is set via the DOCKERHUB_USERNAME env below.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      chatdev_ref:
        description: "Upstream OpenBMB/ChatDev git ref to build"
        required: false
        default: "v2.2.0"

permissions:
  contents: read

concurrency:
  group: build-images-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY_NAMESPACE: guidedtraffic
  # Docker Hub login user (Docker ID) — owns DOCKERHUB_PAT, pushes to the namespace.
  DOCKERHUB_USERNAME: guidedtraffic
  CHATDEV_REF: ${{ github.event.inputs.chatdev_ref || 'v2.2.0' }}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout overlay repo
        uses: actions/checkout@v4

      - name: Checkout pinned ChatDev upstream
        uses: actions/checkout@v4
        with:
          repository: OpenBMB/ChatDev
          ref: ${{ env.CHATDEV_REF }}
          path: chatdev-src

      - name: Stage frontend production overlay
        run: cp images/frontend/Dockerfile images/frontend/nginx.conf chatdev-src/frontend/

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PAT }}

      # ---- backend ----
      - name: Backend image metadata
        id: meta_backend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY_NAMESPACE }}/chatdev-backend
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=sha,prefix=sha-

      - name: Build & push backend
        uses: docker/build-push-action@v6
        with:
          context: chatdev-src
          file: chatdev-src/Dockerfile
          target: runtime
          push: true
          tags: ${{ steps.meta_backend.outputs.tags }}
          labels: ${{ steps.meta_backend.outputs.labels }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

      # ---- frontend ----
      - name: Frontend image metadata
        id: meta_frontend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY_NAMESPACE }}/chatdev-frontend
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=sha,prefix=sha-

      - name: Build & push frontend
        uses: docker/build-push-action@v6
        with:
          context: chatdev-src/frontend
          file: chatdev-src/frontend/Dockerfile
          target: runtime
          push: true
          tags: ${{ steps.meta_frontend.outputs.tags }}
          labels: ${{ steps.meta_frontend.outputs.labels }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend
