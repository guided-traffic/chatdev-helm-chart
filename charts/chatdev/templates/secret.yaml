{{- if not .Values.secrets.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "chatdev.secretName" . }}
  labels:
    {{- include "chatdev.labels" . | nindent 4 }}
type: Opaque
stringData:
  API_KEY: {{ required "secrets.apiKey is required unless secrets.existingSecret is set" .Values.secrets.apiKey | quote }}
  {{- if .Values.secrets.serperDevApiKey }}
  SERPER_DEV_API_KEY: {{ .Values.secrets.serperDevApiKey | quote }}
  {{- end }}
  {{- if .Values.secrets.jinaApiKey }}
  JINA_API_KEY: {{ .Values.secrets.jinaApiKey | quote }}
  {{- end }}
{{- end }}
