apiVersion: v1
kind: Service
metadata:
  name: {{ include "chatdev.frontend.fullname" . }}
  labels:
    {{- include "chatdev.labels" . | nindent 4 }}
    app.kubernetes.io/component: frontend
spec:
  type: {{ .Values.frontend.service.type }}
  selector:
    {{- include "chatdev.frontend.selectorLabels" . | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.frontend.service.port }}
      targetPort: http
      protocol: TCP
